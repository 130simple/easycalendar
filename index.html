<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Easy Calendar</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVMcb60Q11e-U4xAmaylKVHJZXPpBjIBo",
            authDomain: "calendar-ceb9e.firebaseapp.com",
            projectId: "calendar-ceb9e",
            storageBucket: "calendar-ceb9e.firebasestorage.app",
            messagingSenderId: "1094269992007",
            appId: "1:1094269992007:web:863a2ed5c9f03805ba4562",
            measurementId: "G-174PWRN8BT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.currentUser = null;

        // 登录/登出
        window.login = () => signInWithPopup(auth, provider).catch(console.error);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            const loginBtn = document.getElementById('login-section');
            const appContent = document.getElementById('app-main');
            if (user) {
                window.currentUser = user;
                loginBtn.classList.add('hidden');
                appContent.classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                await syncFromCloud();
            } else {
                window.currentUser = null;
                loginBtn.classList.remove('hidden');
                appContent.classList.add('hidden');
            }
        });

        window.syncToCloud = async () => {
            if (!window.currentUser) return;
            await setDoc(doc(db, "users", window.currentUser.uid), { events: window.events }, { merge: true });
        };

        async function syncFromCloud() {
            const docSnap = await getDoc(doc(db, "users", window.currentUser.uid));
            if (docSnap.exists()) window.events = docSnap.data().events || [];
            window.renderAll();
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .view-btn { padding: 4px 16px; border-radius: 999px; font-size: 12px; color: #71717a; }
        .view-btn.active { background: white; color: black; font-weight: 600; }
        .input-field { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; }
        .label-text { font-size: 10px; font-weight: 700; color: #52525b; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; }
        .color-dot.selected { border-color: white; transform: scale(1.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col overflow-hidden">

    <div id="login-section" class="flex-1 flex flex-col items-center justify-center p-10 text-center">
        <div class="w-16 h-16 bg-white rounded-full mb-8 flex items-center justify-center">
            <div class="w-8 h-8 border-4 border-black rounded-sm"></div>
        </div>
        <h1 class="text-3xl font-bold mb-2 tracking-tighter">Easy Calendar</h1>
        <p class="text-zinc-500 text-sm mb-10">Cloud Synchronized</p>
        <button onclick="login()" class="flex items-center gap-3 bg-white text-black px-8 py-4 rounded-full font-bold shadow-lg">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
            Sign in with Google
        </button>
    </div>

    <div id="app-main" class="hidden flex-1 flex flex-col p-6 overflow-hidden">
        <header class="mb-4 flex justify-between items-start">
            <div>
                <h1 id="live-clock" class="text-4xl font-bold tracking-tight">00:00</h1>
                <p id="live-date" class="text-zinc-500 uppercase tracking-widest text-[10px] mt-1"></p>
            </div>
            <div class="flex flex-col items-end gap-3">
                <img id="user-avatar" onclick="logout()" class="w-8 h-8 rounded-full border border-zinc-800 cursor-pointer shadow-md">
                <div class="flex bg-zinc-900/50 p-1 rounded-full border border-zinc-800">
                    <button onclick="switchView('calendar')" id="btn-cal" class="view-btn">Calendar</button>
                    <button onclick="switchView('timeline')" id="btn-time" class="view-btn active">Timeline</button>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto no-scrollbar pb-20">
            <section id="monthly-container" class="hidden">
                <div class="flex justify-between items-center mb-6 px-2">
                    <button onclick="changeMonth(-1)" class="text-zinc-500 text-xl">&lt;</button>
                    <h3 id="cal-month-title" class="text-sm font-bold tracking-widest uppercase"></h3>
                    <button onclick="changeMonth(1)" class="text-zinc-500 text-xl">&gt;</button>
                </div>
                <div id="monthly-grid" class="grid grid-cols-7 gap-y-1 text-center"></div>
            </section>
            <section id="timeline-container">
                <div class="flex justify-between mb-8 px-1" id="weekly-strip"></div>
                <div id="event-list" class="space-y-6 relative border-l border-zinc-900 ml-3 pl-7"></div>
            </section>
        </main>
        <button onclick="openModal()" class="fixed bottom-8 right-8 bg-white text-black w-14 h-14 rounded-full font-bold shadow-2xl flex items-center justify-center text-2xl z-40">+</button>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6 z-50">
        <div class="bg-zinc-900 w-full rounded-[32px] p-8 border border-zinc-800">
            <h2 class="text-2xl font-bold mb-6">Schedule</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-5">
                <div><label class="label-text">Date</label><input type="date" id="in-date" class="input-field"></div>
                <div><label class="label-text">Title</label><input type="text" id="in-title" class="input-field" placeholder="What's next?"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="label-text">Start</label><input type="time" id="in-start" class="input-field"></div>
                    <div class="flex-1"><label class="label-text">End</label><input type="time" id="in-end" class="input-field"></div>
                </div>
                <div class="flex gap-3 pt-2" id="color-picker">
                    <div class="color-dot bg-zinc-600 selected" data-color="#52525b"></div>
                    <div class="color-dot bg-blue-600" data-color="#2563eb"></div>
                    <div class="color-dot bg-rose-600" data-color="#e11d48"></div>
                </div>
            </div>
            <div class="mt-10 flex flex-col gap-3">
                <button onclick="saveEvent()" class="w-full bg-white text-black py-4 rounded-2xl font-bold">Confirm</button>
                <button id="del-btn" onclick="deleteEvent()" class="text-red-500 text-xs hidden">Delete</button>
                <button onclick="closeModal()" class="text-zinc-500 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        window.events = [];
        let selectedDate = new Date();
        let viewDate = new Date();
        let selectedColor = '#52525b';

        const formatDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        window.renderAll = () => {
            renderWeekly();
            renderTimeline();
            renderCalendar();
        };

        function switchView(v) {
            const isCal = v === 'calendar';
            document.getElementById('monthly-container').classList.toggle('hidden', !isCal);
            document.getElementById('timeline-container').classList.toggle('hidden', isCal);
            document.getElementById('btn-cal').classList.toggle('active', isCal);
            document.getElementById('btn-time').classList.toggle('active', !isCal);
        }

        function renderWeekly() {
            const strip = document.getElementById('weekly-strip');
            strip.innerHTML = '';
            for(let i=-3; i<=3; i++) {
                const d = new Date(selectedDate); d.setDate(selectedDate.getDate() + i);
                const active = d.toDateString() === selectedDate.toDateString();
                strip.innerHTML += `<div onclick="setDate('${formatDate(d)}')" class="flex flex-col items-center cursor-pointer">
                    <span class="text-[8px] text-zinc-600 mb-1 font-bold">${d.toLocaleDateString('en-US',{weekday:'short'}).charAt(0)}</span>
                    <span class="w-8 h-8 flex items-center justify-center rounded-full text-xs ${active?'bg-white text-black font-bold':'text-zinc-500'}">${d.getDate()}</span>
                </div>`;
            }
        }

        function renderTimeline() {
            const list = document.getElementById('event-list');
            list.innerHTML = '';
            const dayEvents = window.events.filter(e => e.date === formatDate(selectedDate)).sort((a,b)=>a.start.localeCompare(b.start));
            if(dayEvents.length === 0) list.innerHTML = '<p class="text-zinc-700 text-xs italic py-10">No plans for today.</p>';
            dayEvents.forEach(e => {
                list.innerHTML += `<div onclick="openModal('${e.id}')" class="relative cursor-pointer group">
                    <div class="absolute -left-[32px] top-2 w-2 h-2 bg-white rounded-full ring-4 ring-black"></div>
                    <p class="text-[9px] text-zinc-600 font-mono mb-1">${e.start} - ${e.end}</p>
                    <div class="glass-card p-4 border-l-4" style="border-left-color:${e.color}">${e.title}</div>
                </div>`;
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('monthly-grid');
            document.getElementById('cal-month-title').innerText = viewDate.toLocaleDateString('en-US',{month:'long', year:'numeric'});
            grid.innerHTML = '<span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>'.split('</span>').map(s=>`<span class="text-[10px] text-zinc-600 font-bold mb-4">${s}</span>`).join('');
            const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const days = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const dateStr = formatDate(new Date(viewDate.getFullYear(), viewDate.getMonth(), d));
                const hasEv = window.events.some(e => e.date === dateStr);
                grid.innerHTML += `<div onclick="setDate('${dateStr}');switchView('timeline')" class="h-12 flex flex-col items-center justify-center cursor-pointer">
                    <span class="text-xs ${dateStr===formatDate(selectedDate)?'bg-white text-black rounded-full w-6 h-6 flex items-center justify-center font-bold':''}">${d}</span>
                    ${hasEv ? '<div class="w-1 h-1 bg-white rounded-full mt-1"></div>' : ''}
                </div>`;
            }
        }

        window.setDate = (s) => { const p=s.split('-'); selectedDate = new Date(p[0],p[1]-1,p[2]); renderAll(); };
        window.changeMonth = (s) => { viewDate.setMonth(viewDate.getMonth()+s); renderCalendar(); };

        window.openModal = (id=null) => {
            document.getElementById('modal').classList.remove('hidden');
            const editId = document.getElementById('edit-id');
            const delBtn = document.getElementById('del-btn');
            if(id) {
                const e = window.events.find(x => x.id == id);
                editId.value = id;
                document.getElementById('in-title').value = e.title;
                document.getElementById('in-date').value = e.date;
                document.getElementById('in-start').value = e.start;
                document.getElementById('in-end').value = e.end;
                delBtn.classList.remove('hidden');
            } else {
                editId.value = '';
                document.getElementById('in-title').value = '';
                document.getElementById('in-date').value = formatDate(selectedDate);
                delBtn.classList.add('hidden');
            }
        };

        window.saveEvent = async () => {
            const id = document.getElementById('edit-id').value;
            const data = { id: id || Date.now(), title: document.getElementById('in-title').value || "Untitled", date: document.getElementById('in-date').value, start: document.getElementById('in-start').value, end: document.getElementById('in-end').value, color: selectedColor };
            if(id) window.events = window.events.map(e => e.id == id ? data : e);
            else window.events.push(data);
            window.renderAll(); closeModal();
            await window.syncToCloud();
        };

        window.deleteEvent = async () => {
            window.events = window.events.filter(e => e.id != document.getElementById('edit-id').value);
            window.renderAll(); closeModal();
            await window.syncToCloud();
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.querySelectorAll('.color-dot').forEach(d => d.onclick = () => {
            document.querySelectorAll('.color-dot').forEach(x=>x.classList.remove('selected'));
            d.classList.add('selected'); selectedColor = d.dataset.color;
        });

        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
        }, 1000);

        renderAll();
    </script>
</body>
</html>
